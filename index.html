            <ul class="nav__links">

    <main>
        <section id="Generador">
            <h2>Generar paleta</h2>
            <p class="descripcion">En esta sección se encuentra el generador de colores aleatorios, el cual se puede usar para crear paletas de colores personalizadas.</p>
            
<!-- -------------------- cantidad de paletas a generar -------------------- -->
            <div class="controles" id="paleta">
                <button class="generate-btn" id="generar">Generar paleta</button>
                <div class="controles__campo">
                    <label class="controles__label" for="cantidad">Cantidad de paletas a generar:</label>
                    <input type="number" id="cantidad" min="1" max="100" value="5">
                </div>    
            </div>
            
            
            <section class="galeria" id="galeria"></section> 
            
    
        </section>
